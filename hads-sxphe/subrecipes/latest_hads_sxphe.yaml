version: 1.0.0
title: Latest HADS and SX Phoenicis Papers
description: Find the newest relevant arXiv papers on HADS and SX Phoenicis with good recall and minimal topic drift.
instructions: |
  You are a precise astronomy literature scout.

  Goal: find the newest relevant papers about HADS and SX Phoenicis.

  Use the arxiv extension with several separate searches instead of one giant query.
  Prefer recall, but reject obviously unrelated papers.

  Search in this order:
  1. "HADS" OR "high-amplitude delta scuti" OR "high amplitude delta scuti" OR "high-amplitude δ scuti"
  2. "SX Phoenicis" OR "SX Phe"
  3. ("delta scuti" OR "δ scuti") AND (high-amplitude OR "high amplitude" OR radial OR "fundamental mode" OR overtone)
  4. If include_reviews is true: ("HADS" OR "SX Phoenicis" OR "SX Phe") AND (review OR survey OR catalog OR catalogue)
  5. If include_case_studies is true: ("HADS" OR "SX Phoenicis" OR "SX Phe") AND (photometry OR spectroscopy OR "period change" OR pulsation OR multiperiodic)

  Filter out clearly unrelated fields.
  Deduplicate by arXiv id and title.

  Output format:
  - short note on search behavior
  - table-like list with: title, year, class, why relevant
  - separate section for ambiguous matches

activities:
  - Search arXiv using layered queries
  - Filter irrelevant matches
  - Deduplicate results
  - Return latest relevant papers

prompt: |
  Find the newest relevant papers from {{ date_from }} onward.

  Topic scope:
  - HADS / high-amplitude Delta Scuti stars
  - SX Phoenicis / SX Phe stars
  - both broad papers and individual-object case studies when allowed

  Constraints:
  - include_case_studies = {{ include_case_studies }}
  - include_reviews = {{ include_reviews }}
  - max_results = {{ max_results }}

  Return up to {{ max_results }} strongest matches, ranked by recency first and relevance second.

parameters:
  - key: date_from
    input_type: string
    requirement: optional
    default: "2023-01-01"
    description: Lower date bound for recent-paper discovery.

  - key: max_results
    input_type: number
    requirement: optional
    default: 12
    description: Maximum number of papers to return.

  - key: include_case_studies
    input_type: boolean
    requirement: optional
    default: true
    description: Include papers focused on specific stars or small samples.

  - key: include_reviews
    input_type: boolean
    requirement: optional
    default: true
    description: Include reviews, surveys, and catalog papers.

extensions:
  - type: stdio
    name: arxiv
    cmd: uv
    args:
      - tool
      - run
      - arxiv-mcp-server
      - --storage-path
      - /Users/krzkot/Documents/arxiv-papers
    timeout: 300
    description: arXiv literature search

settings:
  goose_model: "GPT-4.1"
  temperature: 0.1
