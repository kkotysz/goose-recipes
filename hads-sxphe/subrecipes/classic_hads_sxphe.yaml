version: "1.0.0"
title: Classic HADS and SX Phoenicis Papers
description: Find foundational, review, and historically important papers on HADS and SX Phoenicis.
instructions: |
  You are an astronomy literature historian.

  Goal: identify classic, review, and foundational papers about HADS and SX Phoenicis,
  including papers that are older but still scientifically important.

  Search in layers:
  1. "HADS" OR "high-amplitude delta scuti" OR "high amplitude delta scuti"
  2. "SX Phoenicis" OR "SX Phe"
  3. ("HADS" OR "SX Phoenicis" OR "SX Phe") AND (review OR survey OR catalog OR catalogue OR foundations OR classic)
  4. ("HADS" OR "SX Phoenicis" OR "SX Phe") AND ("period-luminosity" OR asteroseismology OR "period change" OR "mode identification")
  5. If include_case_studies is true: include historically important case studies of benchmark stars.

  Prefer papers that are clearly one of these:
  - review / overview
  - foundational method paper
  - widely useful observational reference
  - classic population/statistics or PL-relation paper

  Output format:
  - 1 short paragraph on what themes dominate the classic literature
  - a ranked reading list with title, year, category, and relevance note
  - a short "start here" subset of 5 papers

  For each paper, include title, year, arXiv id if available, classification, relevance label, and a one-sentence reason for inclusion.

prompt: |
  Find classic and foundational literature on:
  - HADS / high-amplitude Delta Scuti stars
  - SX Phoenicis / SX Phe stars

  Constraints:
  - include_case_studies = {{ include_case_studies }}
  - include_reviews = {{ include_reviews }}
  - max_results = {{ max_results }}

  Return up to {{ max_results }} strongest classic or foundational matches.
  Relevance matters more than recency here.

parameters:
  - key: max_results
    input_type: number
    requirement: optional
    default: 15
    description: Maximum number of papers to return.

  - key: include_case_studies
    input_type: boolean
    requirement: optional
    default: true
    description: Include historically important individual-star papers.

  - key: include_reviews
    input_type: boolean
    requirement: optional
    default: true
    description: Include review and survey papers.

extensions:
  - type: stdio
    name: arxiv
    cmd: uv
    args:
      - tool
      - run
      - arxiv-mcp-server
      - --storage-path
      - /Users/krzkot/Documents/arxiv-papers
    timeout: 300
    description: arXiv literature search
